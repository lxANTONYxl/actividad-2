<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Grupo 2</title>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">Sitio Grupo 2</div>
            <ul class="nav-links">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Acerca</a></li>
                <li><a href="#">Servicios</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <section class="hero">
        <h1>Bienvenido a nuestra Página</h1>
        <p>Una página web creada colaborativamente con HTML, CSS y Python.</p>
        <a href="#contacto" class="btn-hero">Contáctanos</a>
    </section>
</body>
<footer id="contacto">
  <div class="footer-container">
    <div class="footer-info">
      <h3>🌐 MiSitio</h3>
      <p>Conectamos ideas con tecnología.</p>
    </div>
    <div class="footer-contacto">
      <h3>Contáctanos</h3>
      <form class="contact-form" onsubmit="enviarFormulario(event)">
        <input type="text" id="nombre" placeholder="Tu nombre" required />
        <input type="email" id="email" placeholder="Tu correo" required />
        <textarea id="mensaje" rows="3" placeholder="Tu mensaje" required></textarea>
        <button type="submit">Enviar</button>
      </form>
      <p id="form-response" class="form-msg"></p>
    </div>
  </div>

</html>
